<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Detalle de Producto | ADV WELDING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <nav class="fixed top-0 w-full z-50 bg-[#f1e34c] border-b border-transparent">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <span class="text-2xl font-bold text-[#0058bb] tracking-tighter">ADV WELDING</span>
            <div class="hidden lg:flex gap-6 items-center">
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="index.html">Inicio</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="catalogo.html">Catálogo</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="admin.html">Admin</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-[#0058bb] relative hover:scale-105 transition-transform" onclick="window.location.href='carrito.html'">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cartCount" class="cart-count absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-8 max-w-7xl mx-auto">
        <div id="productDetail" class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 flex flex-col md:flex-row gap-12">
            <!-- Inyectado por JS -->
        </div>
    </section>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productId = localStorage.getItem('adv_selected_product');
            const products = getProducts();
            const product = products.find(p => p.id === productId);
            
            if (!product) {
                document.getElementById('productDetail').innerHTML = '<p class="text-gray-500">Producto no encontrado.</p>';
                return;
            }

            document.getElementById('productDetail').innerHTML = `
                <div class="md:w-1/2">
                    <img src="${product.image}" alt="${product.name}" class="w-full rounded-xl object-cover aspect-square">
                </div>
                <div class="md:w-1/2 flex flex-col justify-center">
                    <span class="text-sm text-gray-500 uppercase tracking-widest font-bold mb-2">${product.category}</span>
                    <h1 class="text-4xl font-extrabold text-gray-900 mb-4">${product.name}</h1>
                    <p class="text-3xl font-bold text-[#0058bb] mb-6">$${parseFloat(product.price).toFixed(2)}</p>
                    <p class="text-gray-600 leading-relaxed mb-8">${product.desc}</p>
                    <button onclick="addToCart('${product.id}')" class="bg-[#f1e34c] text-yellow-900 px-8 py-4 rounded-lg font-bold hover:bg-yellow-400 transition flex items-center justify-center gap-2 w-full md:w-auto">
                        <span class="material-symbols-outlined">add_shopping_cart</span>
                        Agregar al Carrito
                    </button>
                </div>
            `;
            updateCartCount();
        });
    </script>
</body>
</html>
