<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ADV WELDING | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <nav class="fixed top-0 w-full z-50 bg-[#f1e34c] border-b border-transparent">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <span class="text-2xl font-bold text-[#0058bb] tracking-tighter">ADV WELDING</span>
            <div class="hidden lg:flex gap-6 items-center">
                <a class="text-[#0058bb] border-b-2 border-[#0058bb] pb-1 font-bold text-sm" href="index.html">Inicio</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="catalogo.html">Catálogo</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="servicios.html">Servicios</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="contacto.html">Contacto</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-[#0058bb] relative hover:scale-105 transition-transform" onclick="window.location.href='carrito.html'">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cartCount" class="cart-count absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-12 px-8 max-w-7xl mx-auto">
        <div class="w-full bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 relative">
            <img src="banner.png" alt="ADV Welding Banner" class="w-full h-auto max-h-[450px] object-contain bg-white" onerror="this.src='https://placehold.co/1200x400/ffffff/000000?text=ADV+WELDING+EQUIPMENT'">
            <div class="absolute bottom-6 right-6 md:bottom-10 md:right-10">
                <a href="catalogo.html" class="bg-[#0058bb] text-white px-6 py-3 md:px-8 md:py-4 rounded-lg font-bold shadow-xl hover:bg-blue-800 transition inline-block">
                    Explorar Catálogo
                </a>
            </div>
        </div>
    </header>

    <section class="py-16 px-8 max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-10">
            <h2 class="text-3xl font-extrabold tracking-tighter text-gray-900">Productos Destacados</h2>
            <a class="text-[#0058bb] font-bold text-sm hover:underline flex items-center gap-1" href="catalogo.html">Ver Todo <span class="material-symbols-outlined text-sm">arrow_forward</span></a>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="featuredProducts">
            <p class="col-span-full text-center text-gray-400 py-10">Conectando con el inventario...</p>
        </div>
    </section>  
    

    <script type="module">
    import { obtenerProductos } from "./js/firebase-db.js";

    // Funciones globales para que el HTML pueda verlas
    window.viewProduct = (id) => window.location.href = `producto.html?id=${id}`;
    window.addToCart = (id) => console.log("Añadido:", id);

    document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('featuredProducts');
        
        try {
            // Obtenemos todos y cortamos los primeros 4 para destacados
            const allProducts = await obtenerProductos();
            const products = allProducts.slice(0, 4);
            
            if (products.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500">No hay productos destacados en este momento.</p>';
                return;
            }

            container.innerHTML = ''; // Limpiar el mensaje de "Cargando"
            
            products.forEach(prod => {
                container.innerHTML += `
                    <div class="group cursor-pointer bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-md transition" onclick="viewProduct('${prod.id}')">
                        <div class="aspect-[3/4] bg-gray-100 overflow-hidden relative">
                            <img alt="${prod.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                                 src="${prod.image || 'https://placehold.co/400x533?text=Sin+Imagen'}" 
                                 onerror="this.src='https://placehold.co/400x533?text=Error+de+Carga'"/>
                        </div>
                        <div class="p-5">
                            <h3 class="text-base font-bold text-gray-900 mb-1 line-clamp-1">${prod.name}</h3>
                            <p class="text-[10px] font-bold text-[#0058bb] tracking-widest uppercase mb-4">${prod.category || 'General'}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-lg font-extrabold text-gray-900">$${parseFloat(prod.price).toLocaleString('es-MX', {minimumFractionDigits: 2})} MXN</span>
                                <button onclick="event.stopPropagation(); addToCart('${prod.id}')" class="bg-[#f1e34c] text-yellow-900 px-3 py-2 rounded-lg flex items-center gap-1 text-xs font-bold hover:bg-yellow-400 transition">
                                    <span class="material-symbols-outlined text-sm">add_shopping_cart</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error cargando destacados:", error);
            container.innerHTML = '<p class="col-span-full text-center text-red-500">Error al cargar productos.</p>';
        }
    });
    </script>
</body>
</html>
