<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin | ADV WELDING</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="bg-gray-50">

<div class="max-w-4xl mx-auto p-8">

<h1 class="text-2xl font-bold mb-6">Panel de Administración</h1>

<form id="adminForm" class="space-y-6 bg-white p-6 rounded-xl shadow">

<input type="text" id="prodName" placeholder="Nombre del producto" class="w-full border p-3 rounded" required>

<textarea id="prodDesc" placeholder="Descripción" class="w-full border p-3 rounded" required></textarea>

<input type="number" id="prodPrice" placeholder="Precio" class="w-full border p-3 rounded" required>

<select id="prodCategory" class="w-full border p-3 rounded">
<option>Inversoras</option>
<option>Caretas</option>
<option>Estereos</option>
<option>Bocinas</option>
</select>

<button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded">
Guardar Producto
</button>

</form>

</div>

<script type="module">

import { agregarProducto } from "./js/firebase-db.js";

console.log("🔥 ADMIN CARGADO");

document.getElementById("adminForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    console.log("🔥 CLICK DETECTADO");

    try {

        const producto = {
            nombre: document.getElementById("prodName").value,
            descripcion: document.getElementById("prodDesc").value,
            precio: parseFloat(document.getElementById("prodPrice").value),
            categoria: document.getElementById("prodCategory").value,
            imagen: "https://placehold.co/300x400"
        };

        console.log("📦 Enviando producto:", producto);

        await agregarProducto(producto);

        console.log("✅ Guardado en Firebase");

        alert("Producto guardado 🔥");

        e.target.reset();

    } catch (error) {
        console.error("❌ ERROR:", error);
        alert("Error al guardar");
    }
});

</script>

</body>
</html>
