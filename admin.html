<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin | ADV WELDING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="bg-[#f9fafb] text-gray-900 antialiased flex h-screen overflow-hidden">
    
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between flex-shrink-0 z-20">
        <div>
            <div class="p-6 mb-2">
                <h1 class="text-xl font-bold text-gray-900">Panel de Administración</h1>
                <p class="text-xs text-gray-500 mt-1">Suite de Gestión</p>
            </div>
            <nav class="px-4 space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 text-gray-600 rounded-lg hover:bg-gray-50 transition">
                    <span class="material-symbols-outlined text-xl">storefront</span> 
                    <span class="text-sm font-medium">Ver Tienda</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-[#0058bb] bg-blue-50 rounded-lg transition relative">
                    <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-[#0058bb] rounded-r-full"></div>
                    <span class="material-symbols-outlined text-xl">inventory_2</span> 
                    <span class="text-sm font-medium">Inventario</span>
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-gray-100">
            <button onclick="resetForm()" class="w-full bg-[#0058bb] text-white py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-blue-800 transition shadow-sm">
                <span class="material-symbols-outlined text-sm">add</span> Agregar Producto
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center flex-shrink-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-900" id="formTitle">Agregar Nuevo Producto</h2>
                <p class="text-xs text-gray-500 mt-1">Tienda / Inventario / Nuevo Artículo</p>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <form id="adminForm" class="max-w-6xl mx-auto">
                <input type="hidden" id="prodId">
                <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    
                    <div class="w-full lg:w-1/3 space-y-6">
                        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                            <h3 class="text-xs font-bold text-gray-400 tracking-wider uppercase mb-4">IMÁGENES DEL PRODUCTO</h3>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 flex flex-col items-center justify-center text-center bg-gray-50 hover:bg-gray-100 transition cursor-pointer relative overflow-hidden aspect-square" onclick="document.getElementById('imageInput').click()">
                                <img id="mainImagePreview" class="absolute inset-0 w-full h-full object-cover hidden">
                                <div id="mainImagePlaceholder" class="flex flex-col items-center">
                                    <span class="material-symbols-outlined text-gray-400 text-4xl mb-3">upload_file</span>
                                    <span class="text-sm font-bold text-gray-900">Subir Imagen</span>
                                </div>
                                <input type="file" id="imageInput" accept="image/*" class="hidden" multiple>
                            </div>
                            <div class="flex gap-3 mt-4 overflow-x-auto pb-2" id="thumbnailContainer"></div>
                        </div>
                    </div>

                    <div class="w-full lg:w-2/3 space-y-6">
                        <div class="bg-white p-6 md:p-8 rounded-xl border border-gray-200 shadow-sm relative">
                            <h3 class="text-lg font-bold text-gray-900 mb-6">Información General</h3>
                            <div class="space-y-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre del Producto</label>
                                    <input type="text" id="prodName" required placeholder="ej. Inversora 200A" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:border-[#0058bb] outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                                    <textarea id="prodDesc" rows="4" required placeholder="Características..." class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:border-[#0058bb] outline-none resize-none"></textarea>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Precio (MXN)</label>
                                        <input type="number" id="prodPrice" step="0.01" required placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:border-[#0058bb] outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">SKU</label>
                                        <input type="text" id="prodSku" placeholder="ADV-INV-001" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:border-[#0058bb] outline-none">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-6 md:p-8 rounded-xl border border-gray-200 shadow-sm">
                            <h3 class="text-xs font-bold text-gray-400 tracking-wider uppercase mb-6">CATEGORIZACIÓN</h3>
                            <div class="flex flex-wrap gap-3" id="categoryPills">
                                <label class="cursor-pointer">
                                    <input type="radio" name="category" value="Inversoras" class="peer hidden" checked>
                                    <div class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 peer-checked:bg-[#0058bb] peer-checked:text-white transition">Inversoras</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="category" value="Caretas" class="peer hidden">
                                    <div class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 peer-checked:bg-[#0058bb] peer-checked:text-white transition">Caretas</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="category" value="Estereos" class="peer hidden">
                                    <div class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 peer-checked:bg-[#0058bb] peer-checked:text-white transition">Estereos</div>
                                </label>
                            </div>
                        </div>

                        <div class="flex justify-end items-center gap-6 pt-4">
                            <button type="button" onclick="resetForm()" class="text-gray-500 font-medium hover:text-gray-900 transition">Descartar</button>
                            <button type="submit" id="submitBtn" class="bg-[#0058bb] text-white px-8 py-3 rounded-lg font-medium hover:bg-blue-800 transition shadow-sm">Guardar en Firebase</button>
                        </div>
                    </div>
                </div>
            </form>

            <div class="max-w-6xl mx-auto mt-16 mb-8">
                <h2 class="text-xl font-bold text-gray-900 mb-6">Inventario en la Nube</h2>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="p-4 font-medium text-gray-500">Producto</th>
                                <th class="p-4 font-medium text-gray-500">Categoría</th>
                                <th class="p-4 font-medium text-gray-500">Precio</th>
                                <th class="p-4 font-medium text-gray-500 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="adminProductList" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Declaramos currentImages globalmente para que app.js pueda leerlo
        window.currentImages = [];

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 600; // Tamaño reducido para no saturar Firestore con Base64
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                            } else {
                                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 60% calidad
                            window.currentImages.push(dataUrl);
                            updateImagePreviews();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
            e.target.value = '';
        });

        function updateImagePreviews() {
            const mainPreview = document.getElementById('mainImagePreview');
            const mainPlaceholder = document.getElementById('mainImagePlaceholder');
            const thumbContainer = document.getElementById('thumbnailContainer');
            
            if (window.currentImages.length > 0) {
                mainPreview.src = window.currentImages[0];
                mainPreview.classList.remove('hidden');
                mainPlaceholder.classList.add('hidden');
            } else {
                mainPreview.classList.add('hidden');
                mainPlaceholder.classList.remove('hidden');
            }
            
            let thumbsHtml = '';
            window.currentImages.forEach((img, index) => {
                thumbsHtml += `
                    <div class="w-20 h-20 border border-gray-200 rounded-lg bg-gray-50 flex items-center justify-center overflow-hidden relative group flex-shrink-0">
                       <img src="${img}" class="w-full h-full object-cover">
                       <button type="button" onclick="removeImage(${index})" class="absolute top-1 right-1 bg-white rounded-full text-red-500 shadow-sm p-1 opacity-0 group-hover:opacity-100 transition">
                         <span class="material-symbols-outlined text-[16px]">close</span>
                       </button>
                    </div>`;
            });
            thumbContainer.innerHTML = thumbsHtml;
        }

        window.removeImage = function(index) {
            window.currentImages.splice(index, 1);
            updateImagePreviews();
        }

        window.resetForm = function() {
            document.getElementById('adminForm').reset();
            document.getElementById('prodId').value = '';
            window.currentImages = [];
            updateImagePreviews();
            document.getElementById('formTitle').innerText = 'Agregar Nuevo Producto';
        }
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
