<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin | ADV WELDING</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-2xl font-bold mb-6">Panel Admin</h1>

<form id="adminForm" class="bg-white p-6 rounded shadow max-w-md">

<input type="text" id="prodName" placeholder="Nombre" class="w-full mb-3 p-2 border" required>
<textarea id="prodDesc" placeholder="Descripción" class="w-full mb-3 p-2 border" required></textarea>
<input type="number" id="prodPrice" placeholder="Precio" class="w-full mb-3 p-2 border" required>

<input type="text" id="prodImage" placeholder="URL Imagen (opcional)" class="w-full mb-3 p-2 border">

<button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
Guardar Producto
</button>

</form>

<table class="mt-10 w-full bg-white">
<thead>
<tr>
<th class="p-2">Nombre</th>
<th class="p-2">Precio</th>
</tr>
</thead>
<tbody id="adminProductList"></tbody>
</table>

<script type="module">
import { agregarProducto, obtenerProductos } from "./js/firebase-db.js";

console.log("🔥 ADMIN CARGADO");

document.addEventListener("DOMContentLoaded", () => {

const form = document.getElementById("adminForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    console.log("🔥 CLICK DETECTADO");

    const producto = {
        nombre: document.getElementById("prodName").value,
        descripcion: document.getElementById("prodDesc").value,
        precio: parseFloat(document.getElementById("prodPrice").value),
        imagen: document.getElementById("prodImage").value || "https://placehold.co/300x400"
    };

    try {
        await agregarProducto(producto);
        console.log("✅ Guardado en Firebase");

        form.reset();
        cargarProductos();

    } catch (error) {
        console.error("❌ Error:", error);
    }
});

async function cargarProductos() {
    const productos = await obtenerProductos();
    const tabla = document.getElementById("adminProductList");

    tabla.innerHTML = "";

    productos.forEach(p => {
        tabla.innerHTML += `
            <tr>
                <td class="p-2">${p.nombre}</td>
                <td class="p-2">$${p.precio}</td>
            </tr>
        `;
    });
}

cargarProductos();

});
</script>

</body>
</html>
