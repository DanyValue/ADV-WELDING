<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin | ADV WELDING</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="bg-[#f9fafb] flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-white border-r p-6">
    <h1 class="font-bold text-xl mb-6">Panel Admin</h1>
    <a href="index.html" class="block mb-3 text-blue-600">Ver tienda</a>
</aside>

<!-- MAIN -->
<main class="flex-1 p-8">

<h2 class="text-2xl font-bold mb-6">Inventario</h2>

<!-- FORM -->
<form id="adminForm" class="bg-white p-6 rounded-xl shadow space-y-4 mb-10">

<input id="prodName" placeholder="Nombre" class="w-full border p-3 rounded" required>

<textarea id="prodDesc" placeholder="Descripción" class="w-full border p-3 rounded" required></textarea>

<input id="prodPrice" type="number" placeholder="Precio" class="w-full border p-3 rounded" required>

<select id="prodCategory" class="w-full border p-3 rounded">
<option>Inversoras</option>
<option>Caretas</option>
<option>Estereos</option>
<option>Bocinas</option>
<option>Controles</option>
</select>

<input type="file" id="imageInput" accept="image/*" class="w-full">

<img id="preview" class="w-32 mt-3 rounded hidden"/>

<button class="bg-blue-600 text-white px-6 py-3 rounded w-full">
Guardar Producto
</button>

</form>

<!-- LISTA -->
<table class="w-full bg-white rounded-xl shadow overflow-hidden">
<thead class="bg-gray-100">
<tr>
<th class="p-3 text-left">Producto</th>
<th class="p-3">Categoría</th>
<th class="p-3">Precio</th>
<th class="p-3">Acciones</th>
</tr>
</thead>

<tbody id="productList"></tbody>
</table>

</main>

<script type="module">

import { agregarProducto, obtenerProductos } from "./js/firebase-db.js";

let imageBase64 = "";

// PREVIEW IMAGEN
document.getElementById("imageInput").addEventListener("change", e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = () => {
        imageBase64 = reader.result;
        const img = document.getElementById("preview");
        img.src = imageBase64;
        img.classList.remove("hidden");
    };

    if(file) reader.readAsDataURL(file);
});

// GUARDAR PRODUCTO
document.getElementById("adminForm").addEventListener("submit", async e => {
    e.preventDefault();

    console.log("🔥 Guardando...");

    const producto = {
        nombre: prodName.value,
        descripcion: prodDesc.value,
        precio: parseFloat(prodPrice.value),
        categoria: prodCategory.value,
        imagen: imageBase64 || "https://placehold.co/300x400"
    };

    await agregarProducto(producto);

    alert("Producto guardado 🔥");

    e.target.reset();
    preview.classList.add("hidden");

    cargarProductos();
});

// CARGAR PRODUCTOS
async function cargarProductos() {
    const productos = await obtenerProductos();
    const container = document.getElementById("productList");

    container.innerHTML = "";

    productos.forEach(p => {
        container.innerHTML += `
        <tr class="border-t">
            <td class="p-3 flex items-center gap-3">
                <img src="${p.imagen}" class="w-12 h-12 rounded object-cover">
                ${p.nombre}
            </td>
            <td class="text-center">${p.categoria}</td>
            <td class="text-center">$${p.precio}</td>
            <td class="text-center text-red-500">---</td>
        </tr>
        `;
    });
}

// INIT
cargarProductos();

</script>

</body>
</html>
