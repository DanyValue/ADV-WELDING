<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin | ADV WELDING</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-2xl font-bold mb-6">Panel Admin</h1>

<form id="adminForm" class="bg-white p-6 rounded shadow max-w-md">

<input type="text" id="prodName" placeholder="Nombre" class="w-full mb-3 p-2 border" required>
<textarea id="prodDesc" placeholder="Descripción" class="w-full mb-3 p-2 border" required></textarea>
<input type="number" id="prodPrice" placeholder="Precio" class="w-full mb-3 p-2 border" required>

<input type="text" id="prodImage" placeholder="URL Imagen (opcional)" class="w-full mb-3 p-2 border">

<button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
Guardar Producto
</button>

</form>

<table class="mt-10 w-full bg-white">
<thead>
<tr>
<th class="p-2">Nombre</th>
<th class="p-2">Precio</th>
</tr>
</thead>
<tbody id="adminProductList"></tbody>
</table>

<script type="module">
import { agregarProducto } from "./js/firebase-db.js";
console.log("🔥 IMPORT OK");
console.log("🔥 ADMIN CARGADO");

document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("adminForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        console.log("🔥 CLICK DETECTADO");

        try {

            const nombre = document.getElementById("prodName").value;
            const descripcion = document.getElementById("prodDesc").value;
            const precio = parseFloat(document.getElementById("prodPrice").value);

            const categoriaRadio = document.querySelector('input[name="category"]:checked');
            const categoria = categoriaRadio ? categoriaRadio.value : "General";

            const imagen = "https://placehold.co/300x400";

            const producto = {
                nombre,
                descripcion,
                precio,
                categoria,
                imagen
            };

            console.log("📦 Enviando producto:", producto);

            await agregarProducto(producto);

            console.log("✅ Guardado en Firebase");

            form.reset();

        } catch (error) {
            console.error("❌ ERROR REAL:", error);
            alert("Error real en consola");
        }

    });

});
</script>

</body>
</html>
