<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Carrito | ADV WELDING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <nav class="fixed top-0 w-full z-50 bg-[#f1e34c] border-b border-transparent">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <span class="text-2xl font-bold text-[#0058bb] tracking-tighter">ADV WELDING</span>
            <div class="hidden lg:flex gap-6 items-center">
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="index.html">Inicio</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="catalogo.html">Catálogo</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium transition-colors" href="admin.html">Admin</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-[#0058bb] relative hover:scale-105 transition-transform" onclick="window.location.href='carrito.html'">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cartCount" class="cart-count absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-8 max-w-4xl mx-auto">
        <h1 class="text-4xl font-extrabold tracking-tighter text-gray-900 mb-10">Tu Carrito</h1>
        <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
            <div id="cartItems" class="divide-y divide-gray-100">
                <!-- Inyectado por JS -->
            </div>
            <div class="mt-8 pt-8 border-t border-gray-100 flex justify-between items-center">
                <span class="text-xl font-bold text-gray-900">Total:</span>
                <span id="cartTotal" class="text-3xl font-extrabold text-[#0058bb]">$0.00</span>
            </div>
            <button onclick="checkout()" class="mt-8 w-full bg-[#0058bb] text-white py-4 rounded-lg font-bold hover:bg-blue-800 transition">Proceder al Pago</button>
        </div>
    </section>

    <script src="app.js"></script>
    <script>
        function renderCart() {
            const cart = getCart();
            const products = getProducts();
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-gray-500 py-4 text-center">Tu carrito está vacío.</p>';
                totalEl.textContent = '$0.00';
                return;
            }

            container.innerHTML = '';
            let total = 0;

            // Agrupar por ID para contar cantidades
            const itemCounts = {};
            cart.forEach(id => {
                itemCounts[id] = (itemCounts[id] || 0) + 1;
            });

            Object.keys(itemCounts).forEach(id => {
                const product = products.find(p => p.id === id);
                if (product) {
                    const quantity = itemCounts[id];
                    const subtotal = product.price * quantity;
                    total += subtotal;

                    container.innerHTML += `
                        <div class="py-4 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <img src="${product.image}" alt="${product.name}" class="w-16 h-16 rounded object-cover">
                                <div>
                                    <h3 class="font-bold text-gray-900">${product.name}</h3>
                                    <p class="text-sm text-gray-500">$${parseFloat(product.price).toFixed(2)} x ${quantity}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-bold text-gray-900">$${subtotal.toFixed(2)}</span>
                                <button onclick="removeFromCart('${id}')" class="text-red-500 hover:text-red-700">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            totalEl.textContent = `$${total.toFixed(2)}`;
            updateCartCount();
        }

        function removeFromCart(id) {
            let cart = getCart();
            const index = cart.indexOf(id);
            if (index > -1) {
                cart.splice(index, 1); // Elimina solo 1 instancia
                localStorage.setItem(CART_KEY, JSON.stringify(cart));
                renderCart();
            }
        }

        function checkout() {
            if(getCart().length === 0) {
                alert("El carrito está vacío");
                return;
            }
            alert("¡Gracias por tu compra! (Simulación)");
            localStorage.removeItem(CART_KEY);
            renderCart();
            updateCartCount();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
