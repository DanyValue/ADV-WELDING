<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Catálogo | ADV WELDING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <nav class="fixed top-0 w-full z-50 bg-[#f1e34c] border-b border-transparent">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <span class="text-2xl font-bold text-[#0058bb] tracking-tighter">ADV WELDING</span>
            <div class="hidden lg:flex gap-6 items-center">
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium" href="index.html">Inicio</a>
                <a class="text-[#0058bb] border-b-2 border-[#0058bb] pb-1 font-bold text-sm" href="catalogo.html">Catálogo</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium" href="servicios.html">Servicios</a>
                <a class="text-gray-700 hover:text-[#0058bb] text-sm font-medium" href="contacto.html">Contacto</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-[#0058bb] relative" onclick="window.location.href='carrito.html'">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cartCount" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-8 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tighter text-gray-900 mb-2">Equipos Profesionales</h1>
                <p class="text-gray-500">Explora nuestra selección de alta gama para soldadura industrial.</p>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <select id="categoryFilter" class="bg-white border border-gray-200 text-sm rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-[#0058bb]">
                    <option value="todos">Todas las categorías</option>
                    <option value="Soldadoras">Soldadoras</option>
                    <option value="Consumibles">Consumibles</option>
                    <option value="Seguridad">Seguridad</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="catalogContainer">
            <p class="col-span-full text-center text-gray-400 py-20">Cargando catálogo...</p>
        </div>
    </main>

    <script type="module">
        import { obtenerProductos } from "./js/firebase-db.js";

        // Función global para redirigir al detalle
        window.viewProduct = (id) => {
            window.location.href = `producto.html?id=${id}`;
        };

        const container = document.getElementById('catalogContainer');
        const filter = document.getElementById('categoryFilter');

        async function renderCatalogo(categoriaSeleccionada = 'todos') {
            try {
                const products = await obtenerProductos();
                
                // Filtrar si es necesario
                const filteredProducts = categoriaSeleccionada === 'todos' 
                    ? products 
                    : products.filter(p => p.category === categoriaSeleccionada);

                if (filteredProducts.length === 0) {
                    container.innerHTML = '<p class="col-span-full text-center py-10 text-gray-500">No se encontraron productos en esta sección.</p>';
                    return;
                }

                container.innerHTML = ''; // Limpiar mensaje de carga

                filteredProducts.forEach(prod => {
                    container.innerHTML += `
                        <div class="group cursor-pointer bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-md transition" onclick="viewProduct('${prod.id}')">
                            <div class="aspect-[3/4] bg-gray-50 overflow-hidden relative">
                                <img alt="${prod.name}" class="w-full h-full object-contain p-4 transition-transform duration-700 group-hover:scale-105" 
                                     src="${prod.image}" 
                                     onerror="this.src='https://placehold.co/400x533?text=Sin+Imagen'">
                            </div>
                            <div class="p-5">
                                <h3 class="text-base font-bold text-gray-900 mb-1 truncate">${prod.name}</h3>
                                <p class="text-[10px] font-bold text-[#0058bb] tracking-widest uppercase mb-4">${prod.category || 'General'}</p>
                                <div class="flex items-center justify-between">
                                    <span class="text-lg font-extrabold text-gray-900">$${parseFloat(prod.price).toLocaleString('es-MX', {minimumFractionDigits: 2})}</span>
                                    <button class="bg-[#f1e34c] text-yellow-900 p-2 rounded-lg hover:bg-yellow-400 transition">
                                        <span class="material-symbols-outlined text-sm">add_shopping_cart</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error en catálogo:", error);
                container.innerHTML = '<p class="col-span-full text-center text-red-500">Error al conectar con el inventario.</p>';
            }
        }

        // Evento de filtro
        filter.addEventListener('change', (e) => {
            container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20">Filtrando...</p>';
            renderCatalogo(e.target.value);
        });

        // Carga inicial
        document.addEventListener('DOMContentLoaded', () => renderCatalogo());
    </script>
</body>
</html>
